apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: fed-workload-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: fake-pod
  namespaceSelector:
    matchNames:
    - fed-workload
  podMetricsEndpoints:
  - port: metrics
    interval: 15s
