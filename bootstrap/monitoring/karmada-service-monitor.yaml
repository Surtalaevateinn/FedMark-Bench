apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: karmada-metrics-discovery
  namespace: karmada-system
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: karmada-apiserver
  endpoints:
  - port: server
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
    path: /metrics
